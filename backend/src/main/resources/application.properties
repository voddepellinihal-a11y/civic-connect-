server.port=8080
server.error.include-message=always
server.error.include-stacktrace=always

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/civicconnect_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google Maps
app.google.maps.key=${GOOGLE_MAPS_KEY:}

# View Resolver (JSP)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# I18n
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8

# JWT
app.jwt.secret=${JWT_SECRET:jalalert-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
